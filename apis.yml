  - aid: hippo-insurance:spinnaker
    name: Spinnaker Insurance (MGA Carrier Paper)
    description: >-
      Spinnaker is Hippo's affiliated specialty admitted carrier providing
      paper for MGAs and program administrators. Integrations are sales-led.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
