      - Maintenance
      - Consumer
    properties:
      - type: ProductPage
        url: https://www.hippo.com/
  - aid: hippo-insurance:first-connect
    name: First Connect (Independent Agent Platform)
    description: >-
      First Connect, a Hippo subsidiary, is an API-first digital platform
      giving independent agents one-stop access to 100+ home, auto, cyber,
      small business, life, and specialty carriers and MGAs. The portal
      bridges to carrier APIs for quote and bind in as few keystrokes as
      possible. Access is gated; commercial terms are agent commission split,
      zero access fees.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.firstconnectinsurance.com/
    baseURL: https://portal.firstconnectinsurance.com
    tags:
