aid: hippo-insurance
url: https://raw.githubusercontent.com/api-evangelist/hippo-insurance/refs/heads/main/apis.yml
name: Hippo Insurance
kind: company
description: >-
  Hippo is a modern homeowners insurance carrier that also offers landlord,
  fire, flood, pet, and auto add-ons, backed by 70+ carrier partners. Hippo's
  smart-home angle is the Hippo Home app, which delivers DIY maintenance
  checklists, seasonal guidance, and a home health score. Hippo's B2B
  distribution runs through First Connect, an API-driven independent-agent
  platform with 100+ carriers and MGAs, and Spinnaker for MGA carrier paper.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Insurance
  - Homeowners
  - Insurtech
  - Smart Home
  - Agents
  - MGA
  - Embedded Insurance
  - Carrier
created: '2026-05-23'
modified: '2026-05-23'
specificationVersion: '0.19'
apis:
  - aid: hippo-insurance:hippo-consumer
    name: Hippo Consumer Quote & Bind
    description: >-
      Direct-to-consumer homeowners quote, bind, and policy management. Quotes
      delivered in under 60 seconds. No public API; carrier partnerships are
      managed via First Connect.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.hippo.com/
