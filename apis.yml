      - type: FAQ
        url: https://faq.hippo.com/en/
  - aid: hippo-insurance:hippo-home
    name: Hippo Home App
    description: >-
      Hippo Home is the consumer smart-home companion app for iOS and Android.
      Provides DIY maintenance checklists, seasonal guidance, and a home
      health score. No public API; integrations are sales-led.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.hippo.com/
    baseURL: https://www.hippo.com
    tags:
